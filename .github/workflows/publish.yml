name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and publish npm package with semantic versioning
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Verify build output
        run: |
          test -f dist/index.es.js || (echo "ESM build missing" && exit 1)
          test -f dist/index.cjs.js || (echo "CJS build missing" && exit 1)
          test -f dist/types/index.d.ts || (echo "Type declarations missing" && exit 1)

      - name: Release with semantic-release
        run: npx semantic-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
